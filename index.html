<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      width: 100%;
      max-width: 580px;
      padding: 30px;
      text-align: center;
    }
    .header {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }
    #status {
      min-height: 60px;
      font-size: 18px;
      margin: 30px 0;
      opacity: 0.9;
    }
    .mic-container {
      margin: 40px 0;
    }
    #mic-btn {
      width: 160px;
      height: 160px;
      font-size: 60px;
      background: #1f2937;
      border: 6px solid #3b82f6;
      color: #3b82f6;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
    }
    #mic-btn.listening {
      background: #166534;
      border-color: #4ade80;
      color: #4ade80;
      box-shadow: 0 0 50px rgba(74, 222, 128, 0.6);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .input-area {
      margin-top: 40px;
      display: flex;
      gap: 12px;
    }
    #text-input {
      flex: 1;
      padding: 18px 24px;
      background: #1f2937;
      border: 1px solid #475569;
      border-radius: 50px;
      color: #e0e0e0;
      font-size: 17px;
    }
    #send-btn {
      padding: 0 32px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      cursor: pointer;
    }
    .note {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Voice AI</div>
    
    <p id="status">Click the mic and ask anything</p>

    <div class="mic-container">
      <button id="mic-btn">🎤</button>
    </div>

    <div class="input-area">
      <input type="text" id="text-input" placeholder="Type your question here...">
      <button id="send-btn">Send</button>
    </div>

    <p class="note">AI replies with voice only</p>
  </div>

  <script>
    const micBtn = document.getElementById('mic-btn');
    const textInput = document.getElementById('text-input');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    const API_KEY = "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";
    const API_URL = "https://api.openai.com/v1/chat/completions";

    let recognition = null;
    let isListening = false;

    // Speech Recognition Setup
    if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.continuous = false;

      recognition.onresult = (event) => {
        const question = event.results[0][0].transcript;
        status.textContent = `You asked: ${question}`;
        getAIResponse(question);
        stopListening();
      };

      recognition.onerror = () => {
        status.textContent = "Couldn't hear clearly. Try again.";
        stopListening();
      };

      recognition.onend = () => {
        stopListening();
      };
    }

    function startListening() {
      if (!recognition) return;
      recognition.start();
      isListening = true;
      micBtn.classList.add('listening');
      status.textContent = "Listening... Speak now";
    }

    function stopListening() {
      if (recognition) recognition.stop();
      isListening = false;
      micBtn.classList.remove('listening');
    }

    // Mic Click - Toggle Start / Stop
    micBtn.addEventListener('click', () => {
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });

    // Send Text
    sendBtn.addEventListener('click', () => {
      const q = textInput.value.trim();
      if (q) {
        status.textContent = `You asked: ${q}`;
        getAIResponse(q);
        textInput.value = '';
      }
    });

    textInput.addEventListener('keypress', (e) => {
      if (e.key === "Enter") sendBtn.click();
    });

    // Real AI Response
    async function getAIResponse(question) {
      status.textContent = "Thinking...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [{ role: "user", content: question }],
            temperature: 0.8
          })
        });

        const data = await res.json();
        const reply = data.choices[0].message.content.trim();
        
        speak(reply);
      } catch (err) {
        status.textContent = "API Error. Check internet or key.";
        console.error(err);
      }
    }

    // Voice Reply
    function speak(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.05;
        utterance.pitch = 1.0;
        
        status.textContent = "AI is speaking...";
        window.speechSynthesis.speak(utterance);

        utterance.onend = () => {
          status.textContent = "Ask me anything";
        };
      }
    }
  </script>
</body>
</html>
